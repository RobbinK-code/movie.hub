<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Movie Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">New Releases</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Watchlist</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <style>
body {
    background-image: url("https://plus.unsplash.com/premium_photo-1710961232986-36cead00da3c?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bW92aWVzfGVufDB8fDB8fHww");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

.overlay {
    background-color: rgba(0, 0, 0, 0.7);
    min-height: 100vh;
}

.card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
}

.card img {
    transition: transform 0.3s ease;
}

/* Card lift */
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5);
}

/* Image zoom */
.card:hover img {
    transform: scale(1.1);
}
</style>

</head>
<body>

<!-- Header -->
<header class="bg-dark text-white text-center p-4">
    <h1>Movie Hub</h1>
</header>


<div class="container my-4">
    <form class="d-flex justify-content-center">
        <input class="form-control w-50 me-2" type="search" placeholder="Search movies...">
        <button class="btn btn-danger" type="submit">Search</button>
    </form>
</div>

<!--main content-->
<div class="container my-5">
    <h2 class="mb-4 text-center">What to Watch</h2>

    <div class="row g-4" id="movieContainer"></div>

    
        
    </div>
</div>

<footer class="bg-dark text-white text-center p-3">
    <p>Movie Hub 2026 All rights reserved</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
