<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Social Media Posts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: white;
        }

        h1 {
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px black(0,0,0,0.1);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: gray;
        }

        p {
            margin: 0;
            color: gray;
        }
    </style>
</head>
<body>

    <h1>Random Social Media Posts</h1>

    <ul id="post-list"></ul>

    <script src="index.js"></script>
</body>
</html>
